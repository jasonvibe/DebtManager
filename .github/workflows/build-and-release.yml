name: Build and Release APK
# Version 1.0.1 - Added robust keystore fallback generation for seamless automated build and release.

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Determine Versioning
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag-based release (e.g., tag v1.2.3 -> version name 1.2.3)
            VERSION_NAME=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,' | sed -e 's/^v//')
            IS_TAG=true
          else
            # Push to main branch (e.g., version name 1.0.42)
            VERSION_NAME="1.0.${{ github.run_number }}"
            IS_TAG=false
          fi
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "IS_TAG=${IS_TAG}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Set up Environment Files and Keystores
        run: |
          # Create an empty .env file so that Secrets Gradle Plugin doesn't complain about a missing file
          touch .env
          
          # Decode the debug keystore if it is committed in base64 form
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64 to debug.keystore..."
            tr -d '\r\n[:space:]' < debug.keystore.base64 | base64 -d > debug.keystore
            echo "Decoded keystore file status:"
            ls -la debug.keystore || echo "Keystore not found after decode!"
          else
            echo "debug.keystore.base64 not found."
          fi

          # Fallback: if debug.keystore still does not exist, generate a fresh one using keytool
          if [ ! -f "debug.keystore" ]; then
            echo "Generating fresh debug.keystore using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

          echo "Final keystore validation:"
          ls -la debug.keystore || echo "Error: debug.keystore is still missing!"
          wc -c debug.keystore || echo "Could not read size of debug.keystore!"

      - name: Repair Gradle Wrapper JAR
        run: |
          gradle wrapper

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Build Android APK
        id: build_apk
        env:
          # Release signing configuration secrets (optional)
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # Check if release signing secrets are provided
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "Release signing secrets found. Setting up release keystore..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            export KEYSTORE_PATH="$(pwd)/my-upload-key.jks"
            
            echo "Building Release APK..."
            ./gradlew assembleRelease --no-configuration-cache --no-daemon \
              -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
              -PversionName=${{ steps.version.outputs.VERSION_NAME }}
            
            APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"
            if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
              APK_PATH="app/build/outputs/apk/release/app-release.apk"
            fi
            
            echo "APK_PATH=${APK_PATH}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "Release signing secrets not found or incomplete. Falling back to Debug APK..."
            ./gradlew assembleDebug --no-configuration-cache --no-daemon \
              -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
              -PversionName=${{ steps.version.outputs.VERSION_NAME }}
            
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
            echo "APK_PATH=${APK_PATH}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare APK Asset
        run: |
          # Rename APK for release cataloging
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
          APK_SRC="${{ steps.build_apk.outputs.APK_PATH }}"
          
          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "Warning: Expected APK not found at '$APK_SRC'. Searching for any compiled APK..."
            FOUND_APK=$(find app/build/outputs/ -name "*.apk" | head -n 1)
            if [ -n "$FOUND_APK" ]; then
              echo "Found APK at: $FOUND_APK"
              APK_SRC="$FOUND_APK"
            else
              echo "Error: No APK file found in build outputs!"
              exit 1
            fi
          fi
          
          if [ "${{ steps.build_apk.outputs.IS_RELEASE }}" = "true" ]; then
            APK_DEST="LoanTracker-v${VERSION_NAME}-release.apk"
          else
            APK_DEST="LoanTracker-v${VERSION_NAME}-debug.apk"
          fi
          
          cp "$APK_SRC" "$APK_DEST"
          echo "APK_DEST=$APK_DEST" >> $GITHUB_ENV
          echo "Prepared APK asset: $APK_DEST"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoanTracker-v${{ steps.version.outputs.VERSION_NAME }}-APK
          path: ${{ env.APK_DEST }}

      - name: Create GitHub Release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.version.outputs.TAG_NAME }}"
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}"
          IS_TAG="${{ steps.version.outputs.IS_TAG }}"
          
          if [ "$IS_TAG" = "true" ]; then
            # Release triggered by a Git tag push
            gh release create "$TAG_NAME" \
              --title "Release $TAG_NAME" \
              --notes "Automated release of Loan Tracker v${VERSION_NAME}. (Git Tag: $TAG_NAME, Build: ${{ github.run_number }})" \
              --target "${{ github.sha }}" \
              --clobber \
              "$APK_DEST"
          else
            # Release triggered by branch push (main/master)
            gh release create "$TAG_NAME" \
              --title "Automated Build $TAG_NAME" \
              --notes "Automated continuous delivery build of Loan Tracker. (Branch: ${{ github.ref_name }}, Build: ${{ github.run_number }})" \
              --target "${{ github.sha }}" \
              --prerelease \
              --clobber \
              "$APK_DEST"
          fi
